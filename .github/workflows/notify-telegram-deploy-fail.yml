name: Deploy + Telegram Alert

on:
  push:
    branches:
      - main # läuft bei Push auf main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Repo auschecken (optional)
      - uses: actions/checkout@v4

      # dein Production Deploy
      - name: Deploy
        id: deploy
        run: |
          ./deploy.sh   # dein deploy script

      # läuft nur wenn der Deploy Step fehlschlägt
      - name: Telegram Nachricht bei Fehler
        if: ${{ steps.deploy.outcome == 'failure' }}
        run: |
          MESSAGE="❌ Production Deploy fehlgeschlagen
          Repo: ${{ github.repository }}
          Commit: ${{ github.event.head_commit.message }}
          Author: ${{ github.actor }}"

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE"
